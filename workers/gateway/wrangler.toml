# ZamSchool Gateway Worker — production config
# Deploy: node --env-file=.env.local scripts/run-wrangler-with-env.mjs -- deploy
#
# Requires CLOUDFLARE_API_TOKEN with:
#   Account.Workers Scripts:Edit, Account.Workers KV Storage:Edit,
#   Account.Workers R2 Storage:Edit, Account.Account Settings:Read
# And NO IP allowlist (or allow your current IP).

name = "zamschool-gateway"
main = "src/index.ts"
compatibility_date = "2026-01-01"
workers_dev = true

# ── R2 Buckets ─────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "zamschool-assets"

[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "zamschool-uploads"

# ── KV Namespaces (IDs filled by scripts/provision-cloudflare.mjs) ─────────
[[kv_namespaces]]
binding = "SESSION_CACHE"
id = "61a36e9b580640dd95de1924bcb9ef3d"

# RATE_LIMITS KV is unused by rate-limit.ts (Upstash / isolate memory instead).
# Binding kept so existing deploys do not break; safe to remove after cutover.
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "4dcb6b91d420436b8d6df323ba46553a"

# D1 offline replica is stubbed in src/d1.ts — omit binding until enabled.

# ── Durable Objects (per-school offline mutation queue) ───────────────────
[durable_objects]
bindings = [
  { name = "SYNC_QUEUE", class_name = "SchoolSyncQueue" }
]

[[migrations]]
tag = "v1"
# Free plan requires SQLite-backed Durable Objects (new_sqlite_classes).
new_sqlite_classes = ["SchoolSyncQueue"]

# ── Non-secret production configuration ───────────────────────────────────
[vars]
UPSTREAM_API = "https://www.zamschoolos.site"
CORS_ALLOWED_ORIGINS = "https://www.zamschoolos.site,https://zamschoolos.site,http://localhost:3000"
JWT_VERIFY_MODE = "signature"
SUPABASE_URL = "https://jnnroitaftfmclegbeac.supabase.co"
SUPABASE_JWT_ISSUER = "https://jnnroitaftfmclegbeac.supabase.co/auth/v1"
SUPABASE_JWT_AUDIENCE = "authenticated"
RATE_LIMIT_ENABLED = "true"
NODE_ENV = "production"

# Rate limits use Upstash Redis (INCR), not KV. Set secrets:
#   node --env-file=.env.local scripts/run-wrangler-with-env.mjs -- secret put UPSTASH_REDIS_REST_URL
#   node --env-file=.env.local scripts/run-wrangler-with-env.mjs -- secret put UPSTASH_REDIS_REST_TOKEN
# Without secrets, the Worker falls back to per-isolate memory (0 KV ops).
#
# Optional HS256 legacy secret (your project uses ES256 JWKS by default):
#   echo "<secret>" | npx wrangler secret put SUPABASE_JWT_SECRET
